
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>s4skillup - Career Guidance & Interview Prep</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#135bec",
            "background-dark": "#050a14",
            "card-bg": "#0a101f",
            "neon-cyan": "#00f0ff",
            "neon-violet": "#8b5cf6",
            "neon-amber": "#ffaa00",
            "neon-green": "#0aff00",
            "neon-red": "#ff003c",
            "glass-border": "rgba(255, 255, 255, 0.1)",
          },
          fontFamily: {
            "display": ["Space Grotesk", "sans-serif"],
            "mono": ["JetBrains Mono", "monospace"],
          },
          animation: {
            'pulse-glow': 'pulse-glow 3s infinite',
            'float': 'float 6s ease-in-out infinite',
            'data-stream': 'data-stream 20s linear infinite',
            'spin-slow': 'spin 15s linear infinite',
            'circuit-move': 'circuit-move 20s linear infinite',
            'scan': 'scan-vertical 3s linear infinite',
          },
          keyframes: {
            'pulse-glow': {
              '0%, 100%': { boxShadow: '0 0 10px rgba(0, 240, 255, 0.2)' },
              '50%': { boxShadow: '0 0 25px rgba(0, 240, 255, 0.5)' },
            },
            'float': {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' },
            },
            'data-stream': {
              '0%': { backgroundPosition: '0 0' },
              '100%': { backgroundPosition: '0 1000px' },
            },
            'circuit-move': {
              '0%': { backgroundPosition: '0 0' },
              '100%': { backgroundPosition: '100px 100px' },
            },
            'scan-vertical': {
              '0%': { top: '0%', opacity: '0' },
              '10%': { opacity: '1' },
              '90%': { opacity: '1' },
              '100%': { top: '100%', opacity: '0' },
            }
          }
        },
      },
    }
  </script>
  <style>
    body {
      background-color: #050a14;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      min-height: 100vh;
    }
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .glass-prism {
      background: rgba(16, 22, 34, 0.4);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .glass-panel {
      background: rgba(10, 16, 31, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 240, 255, 0.2);
    }
    .iso-card {
      background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transform-style: preserve-3d;
      transition: all 0.3s ease;
    }
    .text-neon {
      text-shadow: 0 0 10px rgba(0, 240, 255, 0.7), 0 0 20px rgba(0, 240, 255, 0.3);
    }
    .bg-grid-perspective {
      background-size: 40px 40px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
      transform: perspective(500px) rotateX(20deg) scale(1.2);
      opacity: 0.15;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-background-dark font-display text-gray-100 antialiased overflow-hidden">
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
