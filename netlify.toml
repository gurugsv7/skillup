[build]
command = "npm ci && npm run build"
publish = "dist"
functions = "netlify/functions"

[build.environment]
NODE_VERSION = "20"
NPM_FLAGS = "--legacy-peer-deps"
CI = "true"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[context.production]
command = "npm install && npm run build"
publish = "dist"

[context.deploy-preview]
command = "npm install && npm run build"
publish = "dist"

[context.branch-deploy]
command = "npm install && npm run build"
publish = "dist"

# Cache settings
[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.html"
[headers.values]
Cache-Control = "public, max-age=3600"

[[headers]]
for = "/*.js"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.css"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
